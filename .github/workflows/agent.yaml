name: Build Agent

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod

      - run: go build -ldflags "-X main.version=${{ github.ref_name }}" -o brewery-agent-darwin-${{ matrix.goarch }} .
        working-directory: agent
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: brewery-agent-darwin-${{ matrix.goarch }}
          path: agent/brewery-agent-darwin-${{ matrix.goarch }}
