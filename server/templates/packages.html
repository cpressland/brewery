{% extends "base.html" %}
{% block title %}Brewery — Packages{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Packages</h2>
  <p class="sub">{{ packages | length }} unique package{% if packages | length != 1 %}s{% endif %} across all hosts</p>
</div>

<div class="search-wrap">
  <input
    type="search"
    name="q"
    value="{{ q }}"
    placeholder="Search packages..."
    autofocus
    hx-get="/packages/search"
    hx-trigger="keyup changed delay:250ms, search"
    hx-target="#package-body"
    hx-include="[name='q']"
  >
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Hosts</th>
      </tr>
    </thead>
    <tbody id="package-body">
      {% include "partials/package_rows.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
