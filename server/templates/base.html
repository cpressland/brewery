<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Brewery{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    :root {
      --crust:    #11111b;
      --mantle:   #181825;
      --base:     #1e1e2e;
      --surface0: #313244;
      --surface1: #45475a;
      --surface2: #585b70;
      --overlay0: #6c7086;
      --subtext0: #a6adc8;
      --subtext1: #bac2de;
      --text:     #cdd6f4;
      --pink:     #f5c2e7;
      --mauve:    #cba6f7;
      --blue:     #89b4fa;
      --green:    #a6e3a1;
      --red:      #f38ba8;
      --peach:    #fab387;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--base);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--pink); text-decoration: none; }
    a:hover { text-decoration: underline; color: var(--mauve); }

    header {
      background: var(--crust);
      border-bottom: 1px solid var(--surface0);
      padding: 0.875rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    header .wordmark {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--pink);
      text-decoration: none;
    }
    header .wordmark:hover { text-decoration: none; color: var(--mauve); }

    header nav { display: flex; gap: 1rem; }
    header nav a { color: var(--subtext1); font-size: 0.8125rem; }

    main { padding: 2rem; max-width: 1100px; margin: 0 auto; }

    .page-header { margin-bottom: 1.75rem; }
    .page-header h2 { font-size: 1.125rem; font-weight: 600; color: var(--text); }
    .page-header .sub { color: var(--subtext0); font-size: 0.8125rem; margin-top: 0.2rem; }

    .stat-row { display: flex; gap: 2rem; margin-bottom: 1.5rem; }
    .stat .label {
      color: var(--overlay0);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .stat .value { color: var(--pink); font-size: 1.75rem; font-weight: 700; line-height: 1.1; }

    .card {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: 8px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left;
      padding: 0.625rem 1rem;
      background: var(--crust);
      color: var(--pink);
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--surface0);
    }

    td {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--surface0);
      color: var(--subtext1);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface0); color: var(--text); }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge-formula { background: rgba(137, 180, 250, 0.15); color: var(--blue); }
    .badge-cask    { background: rgba(203, 166, 247, 0.15); color: var(--mauve); }

    .search-wrap { margin-bottom: 1rem; position: relative; }
    input[type="search"] {
      width: 100%;
      background: var(--mantle);
      border: 1px solid var(--surface1);
      border-radius: 6px;
      color: var(--text);
      padding: 0.5rem 0.875rem;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="search"]:focus { border-color: var(--pink); }
    input[type="search"]::placeholder { color: var(--overlay0); }

    .empty {
      color: var(--overlay0);
      text-align: center;
      padding: 2.5rem 1rem;
      font-size: 0.875rem;
    }

    .back-link { color: var(--subtext0); font-size: 0.8125rem; }
    .back-link:hover { color: var(--pink); text-decoration: none; }

    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }

    .filter-tabs { display: flex; gap: 0.375rem; margin-bottom: 0.75rem; }
    .filter-tab {
      background: var(--surface0);
      border: 1px solid var(--surface1);
      border-radius: 6px;
      color: var(--subtext0);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8125rem;
      padding: 0.35rem 0.875rem;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .filter-tab:hover { border-color: var(--overlay0); color: var(--text); }
    .filter-tab.active {
      background: rgba(245, 194, 231, 0.12);
      border-color: var(--pink);
      color: var(--pink);
    }

    code {
      font-family: "SF Mono", ui-monospace, "Cascadia Code", monospace;
      font-size: 0.8125rem;
      color: var(--subtext0);
    }

    .version-bar-wrap {
      background: var(--surface0);
      border-radius: 3px;
      height: 5px;
      width: 120px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }
    .version-bar { background: var(--pink); height: 100%; }

    .host-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .host-chip {
      background: var(--surface0);
      border-radius: 4px;
      padding: 0.1rem 0.45rem;
      font-size: 0.75rem;
      color: var(--subtext1);
    }
    .host-chip a { color: var(--subtext1); }
    .host-chip a:hover { color: var(--pink); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="wordmark">Brewery</a>
    <nav>
      <a href="/">Hosts</a>
      <a href="/packages">Packages</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
